
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <script>
        (function () {
          try {
            var k = "ewarrantify-theme";
            var t = localStorage.getItem(k);
            if (t === "dark") document.documentElement.classList.add("dark");
            else if (t === "light") document.documentElement.classList.remove("dark");
            else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
              document.documentElement.classList.add("dark");
          } catch (e) {}
        })();
      </script>
      <link rel="icon" type="image/svg+xml" href="/ewarrantify-logo.png" />
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>E-Warrantify</title>

      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet"
      />
    </head>
    

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.jsx"></script>
    </body>
  </html>
